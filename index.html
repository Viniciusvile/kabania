<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kabania</title>
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      // Ignore extension/external errors
      if (typeof msg === 'string' && (msg.includes('MetaMask') || msg.includes('extension'))) return false;
      
      document.body.innerHTML += '<div style="background:red;color:white;padding:20px;position:fixed;top:0;left:0;z-index:9999;width:100%;font-size:20px;font-family:monospace;"><h3>Runtime Error:</h3><p>' + msg + '</p><pre>' + (error ? error.stack : '') + '</pre></div>';
      return false;
    };
    window.onunhandledrejection = function (event) {
      const reason = event.reason ? (event.reason.message || event.reason.toString()) : '';
      
      // Ignore extension/external rejections
      if (reason.includes('MetaMask') || reason.includes('extension') || reason.includes('i: Failed to connect')) return;

      document.body.innerHTML += '<div style="background:orange;color:white;padding:20px;position:fixed;top:0;left:0;z-index:9999;width:100%;font-size:20px;font-family:monospace;"><h3>Promise Rejection:</h3><p>' + reason + '</p></div>';
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
