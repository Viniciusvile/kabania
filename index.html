<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kabania</title>
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      if (typeof msg === 'string' && (msg.includes('MetaMask') || msg.includes('extension') || msg.includes('Lock broken') || msg.includes('steal'))) return false;
      
      const div = document.createElement('div');
      div.className = 'runtime-error-overlay';
      div.style.cssText = "background:#ef4444;color:white;padding:1.5rem;position:fixed;top:0;left:0;z-index:99999;width:100%;font-family:monospace;box-shadow:0 10px 30px rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:0.5rem;";
      div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;"><strong>Runtime Error:</strong><button onclick="this.parentElement.parentElement.remove()" style="background:rgba(255,255,255,0.2);border:none;color:white;cursor:pointer;padding:4px 8px;border-radius:4px;">Fechar</button></div>' + 
                      '<p style="margin:0.5rem 0;">' + msg + '</p>' + 
                      '<pre style="font-size:11px;opacity:0.8;background:rgba(0,0,0,0.2);padding:10px;border-radius:4px;overflow:auto;max-height:200px;">' + (error ? error.stack : 'No stack trace available') + '</pre>';
      document.body.appendChild(div);
      return false;
    };
    window.onunhandledrejection = function (event) {
      const reason = event.reason ? (event.reason.message || event.reason.toString() || 'Unknown rejection') : 'Unknown rejection';
      
      // 🛡️ Filtro Crítico para Supabase Locks e Extensões
      const isIgnorable = reason.includes('MetaMask') || 
                         reason.includes('extension') || 
                         reason.includes('Lock broken') || 
                         reason.includes('steal') ||
                         reason.includes('i: Failed to connect');
                         
      if (isIgnorable) return;

      const div = document.createElement('div');
      div.className = 'promise-rejection-overlay';
      div.style.cssText = "background:#f59e0b;color:white;padding:1.5rem;position:fixed;top:0;left:0;z-index:99999;width:100%;font-family:monospace;box-shadow:0 10px 30px rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:0.5rem;";
      div.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;"><strong>Promise Rejection (Kabania Guard):</strong><button onclick="this.parentElement.parentElement.remove()" style="background:rgba(255,255,255,0.2);border:none;color:white;cursor:pointer;padding:4px 8px;border-radius:4px;">Fechar</button></div>' + 
                      '<p style="margin:0.5rem 0;">' + reason + '</p>' + 
                      '<p style="font-size:11px;opacity:0.8;margin:0;">Nota: Isso pode ocorrer por conflitos de cache entre abas. Se persistir, limpe o cache do navegador.</p>';
      document.body.appendChild(div);
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
